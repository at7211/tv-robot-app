<!DOCTYPE html>
<html lang="en">
  <head>
    <title>肥豬電腦遙控器</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.js"></script>

    <style>
      * {
        -moz-user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        touch-action: manipulation;
      }
      h2 {
        margin-top: 15px !important;
      }
      .main.ui {
        width: 100% !important;
      }
      .main.ui > div {
        display: flex;
        margin-bottom: 5px;
      }
      .main.ui > div > button {
        height: 35vh;
        flex: 1;
        margin: 0 0.15em !important;
      }
      .main.ui > div > button > i {
        transform: scale(5);
      }

      .shortcut-row button {
        height: 20vh !important;
      }
      .shortcut-row button i {
        transform: scale(3) !important;
      }

      #mode-toggle {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      #mode-toggle i {
        transform: scale(1) !important;
      }
      #mouse-mode {
        display: none;
        width: 100%;
        height: 100vh;
        flex-direction: column;
      }
      #mouse-mode.active {
        display: flex;
      }
      #mouse-trackpad {
        flex: 1;
        background-color: #e0e0e0;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2em;
        color: #999;
      }
      #mouse-scroll-area {
        width: 50px;
        background-color: #ccc;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        writing-mode: vertical-rl;
        color: #888;
        font-size: 0.8em;
      }

      /* iPad / tablet */
      @media (min-width: 768px) {
        #mouse-buttons {
          height: 25vh;
          min-height: 160px;
        }
        #mouse-buttons button {
          font-size: 2em;
        }
        #mouse-scroll-area {
          width: 80px;
          font-size: 1em;
        }
      }
      #mouse-buttons {
        display: flex;
        height: 20vh;
        min-height: 100px;
      }
      #mouse-buttons button {
        flex: 1;
        height: 100% !important;
        margin: 0 !important;
        border-radius: 0 !important;
        font-size: 1.4em;
      }
      #keyboard-mode {
        display: none;
        width: 100%;
        height: 100vh;
        flex-direction: column;
        padding: 60px 16px 16px;
      }
      #keyboard-mode.active {
        display: flex;
      }
      #keyboard-mode h3 {
        text-align: center;
        margin-bottom: 12px;
        color: #555;
      }
      #keyboard-input {
        width: 100%;
        font-size: 1.3em;
        padding: 14px 16px;
        border: 2px solid #ccc;
        border-radius: 10px;
        outline: none;
        margin-bottom: 12px;
        -webkit-user-select: text;
        -moz-user-select: text;
      }
      #keyboard-input:focus {
        border-color: #4183c4;
      }
      #keyboard-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      #keyboard-actions button {
        flex: 1;
        height: 50px !important;
        margin: 0 !important;
        font-size: 1.1em !important;
      }
      #keyboard-shortcuts {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        flex: 1;
      }
      #keyboard-shortcuts button {
        height: auto !important;
        min-height: 55px;
        margin: 0 !important;
        font-size: 1em !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
      }
      #keyboard-shortcuts button i {
        transform: scale(1.5) !important;
        margin-bottom: 4px;
      }
      #keyboard-shortcuts button span {
        font-size: 0.75em;
        color: #888;
      }
    </style>
  </head>

  <body>
    <button id="mode-toggle" class="ui labeled icon button">
      <i class="mouse pointer icon"></i>
      滑鼠模式
    </button>

    <h2 id="title">肥豬電腦遙控器</h2>

    <div id="remote-mode" class="main ui container">
      <div>
        <button id="left" class="ui icon button">
          <i class="icon backward"></i>
        </button>
        <button id="space" class="ui icon button">
          <i class="icon pause" style="display: none;"></i>
          <i class="icon play"></i>
        </button>
        <button id="right" class="ui icon button">
          <i class="icon forward"></i>
        </button>
      </div>
      <div>
        <button id="volume_down" class="ui icon button">
          <i class="icon volume down"></i>
        </button>
        <button id="volume_up" class="ui icon button">
          <i class="icon volume up"></i>
        </button>
      </div>
      <div class="shortcut-row">
        <button id="fullscreen" class="ui icon button">
          <i class="expand icon"></i>
        </button>
        <button id="mute" class="ui icon button">
          <i class="volume off icon"></i>
        </button>
        <button id="skip_intro" class="ui icon button">
          <i class="step forward icon"></i>
        </button>
        <button id="captions" class="ui icon button">
          <i class="closed captioning icon"></i>
        </button>
      </div>
    </div>

    <div id="mouse-mode">
      <div style="display: flex; flex: 1;">
        <div id="mouse-trackpad">在此滑動控制滑鼠</div>
        <div id="mouse-scroll-area">捲動</div>
      </div>
      <div id="mouse-buttons">
        <button id="mouse-left" class="ui button">左鍵</button>
        <button id="mouse-right" class="ui button">右鍵</button>
      </div>
    </div>

    <div id="keyboard-mode">
      <h3>⌨️ 鍵盤模式</h3>
      <input id="keyboard-input" type="text" placeholder="點此輸入文字..." autocomplete="off" autocorrect="off" autocapitalize="off" />
      <div id="keyboard-actions">
        <button id="keyboard-send" class="ui blue button">送出文字</button>
        <button id="keyboard-enter" class="ui button">Enter</button>
        <button id="keyboard-backspace" class="ui button">刪除</button>
      </div>
      <div id="keyboard-shortcuts">
        <button id="key-esc" class="ui button">
          <i class="close icon"></i>
          <span>Esc</span>
        </button>
        <button id="key-tab" class="ui button">
          <i class="indent icon"></i>
          <span>Tab</span>
        </button>
        <button id="key-select-all" class="ui button">
          <i class="expand arrows alternate icon"></i>
          <span>全選</span>
        </button>
        <button id="key-copy" class="ui button">
          <i class="copy icon"></i>
          <span>複製</span>
        </button>
        <button id="key-paste" class="ui button">
          <i class="paste icon"></i>
          <span>貼上</span>
        </button>
        <button id="key-undo" class="ui button">
          <i class="undo icon"></i>
          <span>復原</span>
        </button>
        <button id="key-up" class="ui button">
          <i class="arrow up icon"></i>
          <span>↑</span>
        </button>
        <button id="key-down" class="ui button">
          <i class="arrow down icon"></i>
          <span>↓</span>
        </button>
        <button id="key-space" class="ui button">
          <i class="minus icon"></i>
          <span>空白</span>
        </button>
      </div>
    </div>

    <script>
      // ========== Helpers ==========
      function post(url, body) {
        var xhr = new XMLHttpRequest()
        xhr.open('POST', url, true)
        if (body) {
          xhr.setRequestHeader('Content-Type', 'application/json')
          xhr.send(JSON.stringify(body))
        } else {
          xhr.send()
        }
      }

      function vibrate() {
        if (navigator.vibrate) navigator.vibrate(50)
      }

      function $(id) { return document.getElementById(id) }

      // ========== Remote Mode ==========
      var spaceEl = $('space')
      var leftEl = $('left')
      var rightEl = $('right')
      var pauseIcon = spaceEl.querySelector('.pause')
      var playIcon = spaceEl.querySelector('.play')
      var isPlaying = true

      spaceEl.addEventListener('click', function () {
        vibrate()
        post('/api/space')
        isPlaying = !isPlaying
        pauseIcon.style.display = isPlaying ? 'none' : ''
        playIcon.style.display = isPlaying ? '' : 'none'
      })

      $('volume_down').addEventListener('click', function () { vibrate(); post('/api/volume_down') })
      $('volume_up').addEventListener('click', function () { vibrate(); post('/api/volume_up') })

      // Left/Right: repeat while held
      function holdButton(el, url) {
        var pressing = false
        var intervalId = null

        function start(e) {
          e.preventDefault()
          if (pressing) return
          pressing = true
          vibrate()
          post(url)
          intervalId = setInterval(function () { post(url) }, 350)
        }
        function stop() {
          pressing = false
          if (intervalId) { clearInterval(intervalId); intervalId = null }
        }

        el.addEventListener('touchstart', start)
        el.addEventListener('touchend', stop)
        el.addEventListener('touchcancel', stop)
        el.addEventListener('mousedown', start)
        el.addEventListener('mouseup', stop)
        el.addEventListener('mouseleave', stop)
      }

      holdButton(leftEl, '/api/left')
      holdButton(rightEl, '/api/right')

      // ========== Streaming Shortcuts ==========
      $('fullscreen').addEventListener('click', function () { vibrate(); post('/api/fullscreen') })
      $('mute').addEventListener('click', function () { vibrate(); post('/api/mute') })
      $('skip_intro').addEventListener('click', function () { vibrate(); post('/api/skip_intro') })
      $('captions').addEventListener('click', function () { vibrate(); post('/api/captions') })

      // ========== Mode Switching ==========
      var modeToggle = $('mode-toggle')
      var remoteMode = $('remote-mode')
      var mouseMode = $('mouse-mode')
      var keyboardMode = $('keyboard-mode')
      var title = $('title')
      var mouseTrackpad = $('mouse-trackpad')
      var mouseScrollArea = $('mouse-scroll-area')
      var currentMode = 0 // 0=remote, 1=mouse, 2=keyboard
      var modes = [
        { icon: 'mouse pointer', label: '滑鼠模式' },
        { icon: 'keyboard', label: '鍵盤模式' },
        { icon: 'gamepad', label: '遙控模式' }
      ]

      function setMode(mode) {
        currentMode = mode
        remoteMode.style.display = mode === 0 ? '' : 'none'
        title.style.display = mode === 0 ? '' : 'none'
        mouseMode.classList.toggle('active', mode === 1)
        keyboardMode.classList.toggle('active', mode === 2)
        var next = modes[mode]
        modeToggle.innerHTML = '<i class="' + next.icon + ' icon"></i> ' + next.label
      }

      modeToggle.addEventListener('click', function () {
        setMode((currentMode + 1) % 3)
      })

      // Trackpad with throttle
      var lastTouchX = null
      var lastTouchY = null
      var sensitivity = 2.0
      var moveThrottled = false

      mouseTrackpad.addEventListener('touchstart', function (e) {
        e.preventDefault()
        lastTouchX = e.touches[0].clientX
        lastTouchY = e.touches[0].clientY
      })

      mouseTrackpad.addEventListener('touchmove', function (e) {
        e.preventDefault()
        if (moveThrottled) return
        var t = e.touches[0]
        if (lastTouchX !== null) {
          var dx = Math.round((t.clientX - lastTouchX) * sensitivity)
          var dy = Math.round((t.clientY - lastTouchY) * sensitivity)
          if (dx !== 0 || dy !== 0) {
            post('/api/mouse/move', { dx: dx, dy: dy })
            moveThrottled = true
            setTimeout(function () { moveThrottled = false }, 16)
          }
        }
        lastTouchX = t.clientX
        lastTouchY = t.clientY
      })

      mouseTrackpad.addEventListener('touchend', function () {
        lastTouchX = null
        lastTouchY = null
      })

      // Scroll with throttle
      var lastScrollY = null
      var scrollThrottled = false

      mouseScrollArea.addEventListener('touchstart', function (e) {
        e.preventDefault()
        lastScrollY = e.touches[0].clientY
      })

      mouseScrollArea.addEventListener('touchmove', function (e) {
        e.preventDefault()
        if (scrollThrottled) return
        var t = e.touches[0]
        if (lastScrollY !== null) {
          var dy = Math.round((lastScrollY - t.clientY) / 10)
          if (dy !== 0) {
            post('/api/mouse/scroll', { dy: dy })
            scrollThrottled = true
            setTimeout(function () { scrollThrottled = false }, 16)
          }
        }
        lastScrollY = t.clientY
      })

      mouseScrollArea.addEventListener('touchend', function () {
        lastScrollY = null
      })

      // Clicks
      $('mouse-left').addEventListener('click', function () { vibrate(); post('/api/mouse/left_click') })
      $('mouse-right').addEventListener('click', function () { vibrate(); post('/api/mouse/right_click') })

      // ========== Keyboard Mode ==========
      var keyboardInput = $('keyboard-input')

      $('keyboard-send').addEventListener('click', function () {
        var text = keyboardInput.value
        if (text) {
          vibrate()
          post('/api/type', { text: text })
          keyboardInput.value = ''
        }
      })

      $('keyboard-enter').addEventListener('click', function () {
        var text = keyboardInput.value
        if (text) {
          post('/api/type', { text: text })
          keyboardInput.value = ''
        }
        vibrate()
        post('/api/return')
      })

      $('keyboard-backspace').addEventListener('click', function () {
        vibrate()
        post('/api/backspace')
      })

      // Shortcut keys
      $('key-esc').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'escape' }) })
      $('key-tab').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'tab' }) })
      $('key-select-all').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'select_all' }) })
      $('key-copy').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'copy' }) })
      $('key-paste').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'paste' }) })
      $('key-undo').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'undo' }) })
      $('key-up').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'up' }) })
      $('key-down').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'down' }) })
      $('key-space').addEventListener('click', function () { vibrate(); post('/api/key', { key: 'space' }) })
    </script>
  </body>
</html>
